<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Converter</title>
</head>

<body>
    <input type="file" name="" id="fileInput" accept=".jsonld">
    <br>
</body>
<script>
    fileInput.onchange = e => {
        //On file insert = read
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = () => {
            //Load JSON
            console.log("LOADED");
            const raw = JSON.parse(reader.result);
            const data = raw.list;
            console.log(data.length);

            //Filter ZŠ
            const filtered = data.filter(x =>
                (x.skolyAZarizeni || []).some(s =>
                    (s.uplnyNazev || "").toLowerCase().includes("základní škola")
                )
            );
            console.log("filtered:", filtered.length);

            //Make Unique
            const unique = Array.from(
                new Map(filtered.map(x => [x.redIzo, x])).values()
            );

            //Make CSV
            const csv = [
                ["name", "address"],
                ...unique.map(x => [
                    x.uplnyNazev,
                    (`${x.adresa?.ulice || ""} ${x.adresa?.cisloDomovni || ""} ${x.adresa?.cisloOrientacni || "" == "" ? "" : "/" + x.adresa?.cisloOrientacni}, ${x.adresa?.obec} ${x.adresa?.psc}`).trim()
                ])
            ].map(r => r.map(v => `"${v}"`).join(",")).join("\n");

            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "zs.csv";
            a.click();

            //Make SQL
            let sql = ""
            unique.forEach(x => {
                sql += "INSERT INTO `schools`(`name`, `address`) VALUES ('" + x.uplnyNazev + "','" + (`${x.adresa?.ulice || ""} ${x.adresa?.cisloDomovni || ""} ${x.adresa?.cisloOrientacni || "" == "" ? "" : "/" + x.adresa?.cisloOrientacni}, ${x.adresa?.obec} ${x.adresa?.psc}`).trim() + "');"
                sql += "\n"
            })
            const blob2 = new Blob([sql], { type: "text/sql;charset=utf-8;" });
            const a2 = document.createElement("a");
            a.href = URL.createObjectURL(blob2);
            a.download = "zs.sql";
            a.click();

        };

        reader.readAsText(file);
    };

    document.body.appendChild(fileInput)
</script>

</html>
